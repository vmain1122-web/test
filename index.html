<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MAID_CORE // CYCLE_METER v5</title>
    <style>
        :root {
            --bg-color: #050202;
            --accent-color: #a30000;
            --terminal-green: #39ff14;
            --terminal-cyan: #00f0ff;
            --text-color: #e2daf0;
            --panel-bg: rgba(10, 5, 5, 0.95);
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'MS Mincho', serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 95vh;
        }
        header {
            border-bottom: 2px double var(--accent-color); padding-bottom: 8px; margin-bottom: 15px;
            display: flex; justify-content: space-between; font-family: monospace; color: var(--accent-color); font-size: 12px;
        }
        .game-container { display: grid; grid-template-columns: 4fr 3fr; gap: 20px; flex-grow: 1; }
        .stage-area { background: var(--panel-bg); border: 1px solid var(--accent-color); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .cast-name { color: var(--accent-color); font-size: 24px; font-weight: bold; margin: 5px 0; }
        .dialogue-box { background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-left: 5px solid var(--accent-color); padding: 18px; min-height: 90px; font-size: 16px; line-height: 1.8; cursor: pointer; }
        
        .counter-area { background: var(--panel-bg); border: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .shelf { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn-ingredient { background: #110808; border: 1px solid #333; color: #ccc; padding: 10px; cursor: pointer; text-align: left; font-size: 12px; }
        .btn-ingredient:hover { background: var(--accent-color); color: #fff; }
        .brew-slots { display: flex; gap: 10px; }
        .slot { flex: 1; background: #000; border: 1px dashed #444; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; }
        .slot.filled { border-style: solid; border-color: var(--accent-color); color: #fff; }
        .btn-serve { padding: 12px; font-weight: bold; cursor: pointer; background: #3a0000; border: 1px solid var(--accent-color); color: #fff; }
        .btn-serve:disabled { background: #111; border-color: #222; color: #444; cursor: not-allowed; }

        .meter-container { background: #000; border: 1px solid #333; padding: 12px; font-family: monospace; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .meter-row { display: flex; flex-direction: column; gap: 3px; }
        .meter-label { display: flex; justify-content: space-between; color: #aaa; }
        .meter-bg { background: #201010; height: 8px; border: 1px solid #444; position: relative; }
        .meter-fill { height: 100%; width: 50%; background: var(--accent-color); transition: width 0.8s ease-in-out; }
        .danger { background: #ff0055 !important; box-shadow: 0 0 8px #ff0055; }
        .stable { background: var(--terminal-cyan) !important; }

        /* コーヒートーク風：本日の精算ポップアップ */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .result-card {
            background: #0d0606; border: 2px solid var(--terminal-green); padding: 30px;
            width: 350px; font-family: monospace; box-shadow: 0 0 15px var(--terminal-green);
        }
        .result-title { color: var(--terminal-green); font-size: 18px; margin-bottom: 20px; text-align: center; border-bottom: 1px dashed var(--terminal-green); padding-bottom: 10px;}
        .result-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 14px;}
        .btn-next-day { width: 100%; padding: 10px; background: #003300; border: 1px solid var(--terminal-green); color: var(--terminal-green); cursor: pointer; font-weight: bold; margin-top: 15px;}
        .btn-next-day:hover { background: var(--terminal-green); color: #000; }
    </style>
</head>
<body>

    <header>
        <div id="sys-day">DAY: 01 // COGNITIVE_METER_LOADED</div>
        <div style="color: var(--terminal-cyan);" id="sys-wallet">WALLET: ¥0</div>
    </header>

    <div class="game-container">
        <div class="stage-area">
            <div>
                <div style="font-family: monospace; color:#777;" id="cast-id">RANK 01</div>
                <div class="cast-name" id="cast-name">あむ / AMU</div>
                <div style="color: #aaa; font-size: 13px;" id="cast-status">MENTAL_LOG: MONITORING</div>
                <div style="margin-top: 30px; text-align: center; color: #444; border: 1px dashed #222; padding: 40px;">[ VISUAL CONSOLE ]</div>
            </div>
            <div class="dialogue-box" onclick="advanceText()">
                <div id="dialogue-text">ロード中...</div>
            </div>
        </div>

        <div class="counter-area">
            <div style="font-size:13px; color:#aaa; border-left: 3px solid var(--accent-color); padding-left: 6px;">🧠 キャスト精神状態モニター</div>
            <div class="meter-container">
                <div class="meter-row">
                    <div class="meter-label"><span>[ 睡眠負債 / SLEEP_DEBT ]</span><span id="v-sleep">--%</span></div>
                    <div class="meter-bg"><div class="meter-fill" id="m-sleep" style="width: 0%;"></div></div>
                </div>
                <div class="meter-row">
                    <div class="meter-label"><span>[ 脳波ノイズ / WAVE_NOISE ]</span><span id="v-noise">--%</span></div>
                    <div class="meter-bg"><div class="meter-fill" id="m-noise" style="width: 0%;"></div></div>
                </div>
                <div class="meter-row">
                    <div class="meter-label"><span>[ 依存同調率 / SYNC_RATE ]</span><span id="v-sync">--%</span></div>
                    <div class="meter-bg"><div class="meter-fill" id="m-sync" style="width: 0%;"></div></div>
                </div>
            </div>

            <div style="font-size:12px; color:#888;">抽出原材料</div>
            <div class="shelf">
                <button class="btn-ingredient" onclick="addIng('安価な睡眠薬')">🧪 安価な睡眠薬</button>
                <button class="btn-ingredient" onclick="addIng('同期用ケチャップ')">🍅 同期用ケチャップ</button>
                <button class="btn-ingredient" onclick="addIng('ドス黒いハーブ')">🌿 ドス黒いハーブ</button>
                <button class="btn-ingredient" onclick="addIng('高周波ノイズ液')">⚡ 高周波ノイズ液</button>
            </div>
            <div style="font-size:12px; color:#888;">現在の配合</div>
            <div class="brew-slots">
                <div class="slot" id="slot-0">ベース</div>
                <div class="slot" id="slot-1">メイン</div>
                <div class="slot" id="slot-2">トッピング</div>
            </div>
            
            <button style="background:#1a0f0f; color:#ff3333; border:1px solid #441111; padding:8px; cursor:pointer; font-family:inherit; font-size:12px;" onclick="clearMix()">
                🗑️ カップの中身をドブに捨てる
            </button>

            <button class="btn-action btn-serve" id="serve-btn" onclick="submitDrink()" disabled>【 お給仕を実行する 】</button>
        </div>
    </div>

    <div class="result-overlay" id="result-screen">
        <div class="result-card">
            <div class="result-title">🛒 END OF DAY REPORT</div>
            <div class="result-row"><span>本日の営業結果:</span><span id="r-status" style="color:var(--terminal-green);">SUCCESS</span></div>
            <div class="result-row"><span>本日獲得した売上:</span><span id="r-earned" style="color:var(--terminal-cyan);">¥2,000</span></div>
            <div class="result-row"><span>財布のトータル:</span><span id="r-total">¥2,000</span></div>
            <button class="btn-next-day" onclick="closeResult()">[ 次の日へ移動する ]</button>
        </div>
    </div>

   <script>
        const API_BASE = "http://localhost:8080/api/game";
        let recipe = [];
        let isWaitingDrink = false;
        let currentDay = 1;

        // 🛠️ 1. メーターのDOMを更新する関数（一番基礎になる部品）
        function updateMeterDOM(key, val) {
            if(val > 100) val = 100; if(val < 0) val = 0;
            const bar = document.getElementById(`m-${key}`);
            const text = document.getElementById(`v-${key}`);
            bar.style.width = val + "%";
            text.innerText = val + "%";

            if (key === 'sleep' || key === 'noise') {
                if (val >= 70) bar.className = "meter-fill danger";
                else bar.className = "meter-fill";
            } else if (key === 'sync') {
                if (val >= 50) bar.className = "meter-fill stable";
                else bar.className = "meter-fill";
            }
        }

        // 🛠️ 2. 手元の調合UIを更新する関数
        function updateMixUI() {
            for(let i = 0; i < 3; i++) {
                const s = document.getElementById(`slot-${i}`);
                if (recipe[i]) { s.innerText = recipe[i]; s.classList.add('filled'); }
                else { s.innerText = i===0?"ベース":i===1?"メイン":"トッピング"; s.classList.remove('filled'); }
            }
            const isFull = (recipe.length === 3);
            document.getElementById('serve-btn').disabled = (!isWaitingDrink || !isFull);
            console.log(`【UI更新】ボタン活性化チェック -> ドリンク待ちか: ${isWaitingDrink}, 3つ入ってるか: ${isFull}`);
        }

        // 🛠️ 3. Javaから返ってきた最新データを画面に焼き付ける関数
        function syncWithJava(data) {
            const frame = data.frame;
            currentDay = frame.day;
            
            document.getElementById('dialogue-text').innerText = frame.text;
            document.getElementById('cast-id').innerText = frame.castId;
            document.getElementById('cast-name').innerText = frame.name;
            document.getElementById('cast-status').innerText = `STATUS: ${frame.status}`;
            document.getElementById('sys-day').innerText = `DAY: 0${frame.day} // INTERCEPT_LOG`;
            document.getElementById('sys-wallet').innerText = `WALLET: ¥${data.wallet.toLocaleString()}`;
            
            document.documentElement.style.setProperty('--accent-color', frame.uiColor);

            updateMeterDOM('sleep', data.sleepDebt);
            updateMeterDOM('noise', data.waveNoise);
            updateMeterDOM('sync', data.syncRate);

            isWaitingDrink = (frame.type === "wait_drink" || frame.status === "WAITING");
            updateMixUI();
        }

        // 🛠️ 4. 本日の精算画面をポップアップする関数
        function showResultScreen(data) {
            const isSuccess = (data.earnedToday === 2000); 
            document.getElementById('r-status').innerText = isSuccess ? "大成功 (AMU同調)" : "失敗 (ただの泥水)";
            document.getElementById('r-status').style.color = isSuccess ? "var(--terminal-green)" : "#ff0055";
            document.getElementById('r-earned').innerText = `¥${data.earnedToday.toLocaleString()}`;
            document.getElementById('r-total').innerText = `¥${data.wallet.toLocaleString()}`;
            document.getElementById('result-screen').style.display = "flex";
        }

        // 🛠️ 5. 精算画面を閉じて次のステップに進む関数
        function closeResult() {
            document.getElementById('result-screen').style.display = "none";
            advanceText();
        }

        // 🛠️ 6. 起動時にJavaから最初の状態を取得する同期関数
        async function bootSequence() {
            try {
                const response = await fetch(`${API_BASE}/state`);
                const data = await response.json();
                console.log("【Boot連動受信】", data);
                syncWithJava(data); // 順番を入れ替えたので、ここで確実に呼び出せます！
            } catch (error) {
                document.getElementById('dialogue-text').innerText = "⚠️ SYSTEM ERROR: 有線接続に失敗。";
                console.error(error);
            }
        }

        // 🛠️ 7. テキストボックスをクリックしたとき（進行通知）
        async function advanceText() {
            if (isWaitingDrink) {
                console.log("-> 現在ドリンク待ち状態のため、テキスト進行をロックしています。");
                return; 
            }
            try {
                const response = await fetch(`${API_BASE}/advance`, { method: 'POST' });
                const data = await response.json();
                console.log("【Advance連動受信】", data);
                syncWithJava(data);
            } catch(e) { console.error(e); }
        }

        // 🛠️ 8. お給仕を実行したとき（パケット送信）
        async function submitDrink() {
            try {
                const response = await fetch(`${API_BASE}/serve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(recipe)
                });
                const data = await response.json();
                recipe = []; 
                syncWithJava(data);
                showResultScreen(data);
            } catch(e) { console.error(e); }
        }

        /* ─── 手元の調合制御（フロントの仕事） ─── */
        function addIng(name) {
            if (recipe.length >= 3) return;
            recipe.push(name);
            updateMixUI();
        }

        function clearMix() {
            recipe = [];
            updateMixUI();
        }

        // 全ての関数が定義し終わった最後の最後で、起動スイッチを入れる
        window.onload = bootSequence;
    </script>
</body>
</html>
